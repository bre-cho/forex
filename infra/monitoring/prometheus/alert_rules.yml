groups:
  - name: forex_live_trading_critical
    interval: 30s
    rules:
      # P1.2: UNKNOWN Order SLA breach
      - alert: UnknownOrderSLABreach
        expr: reconciliation_queue_depth > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "UNKNOWN orders unresolved > 5 min"
          description: "{{ $value }} items in reconciliation queue unresolved for more than 5 minutes."

      # P1.2: Reconciliation overdue escalation spike
      - alert: ReconciliationOverdueSpike
        expr: rate(reconciliation_overdue_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Reconciliation items escalated to dead-letter"
          description: "Reconciliation item for bot={{ $labels.bot_id }} escalated (deadline/max-attempts)."

      # P1.2: Bot runtime heartbeat stale (bot may have crashed)
      - alert: BotRuntimeHeartbeatStale
        expr: bot_runtime_heartbeat_age_seconds > 120
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Bot runtime heartbeat stale > 120s"
          description: "Bot {{ $labels.bot_id }} has not sent a heartbeat in {{ $value | humanizeDuration }}."

      # P1.2: Worker heartbeat stale
      - alert: WorkerHeartbeatStale
        expr: worker_heartbeat_age_seconds > 90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Worker {{ $labels.worker_name }} heartbeat stale"
          description: "Worker {{ $labels.worker_name }} last heartbeat {{ $value | humanizeDuration }} ago."

      # P1.2: Provider certification expired/missing
      - alert: ProviderCertificationMissing
        expr: provider_certification_status == 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Provider certification invalid for bot={{ $labels.bot_id }}"
          description: "Provider {{ $labels.provider }} certification expired or missing for bot {{ $labels.bot_id }}."

      # P1.2: Broker quote stale
      - alert: BrokerQuoteStale
        expr: broker_quote_age_seconds > 15
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "Broker quote stale > 15s"
          description: "Bot {{ $labels.bot_id }}/{{ $labels.symbol }} quote age is {{ $value }}s."

  - name: forex_live_trading_execution
    interval: 30s
    rules:
      # P1.2: Order submit latency P95 > 5s
      - alert: OrderSubmitLatencyHigh
        expr: histogram_quantile(0.95, rate(order_submit_latency_ms_bucket[5m])) > 5000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Order submit P95 latency > 5s"
          description: "Order submit P95 is {{ $value }}ms for bot={{ $labels.bot_id }} provider={{ $labels.provider }}."

      # P1.2: High order rejection rate (>20% of placed)
      - alert: HighOrderRejectionRate
        expr: |
          rate(order_rejected_total[5m]) /
          (rate(order_placed_total[5m]) + 0.001) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High order rejection rate > 20%"
          description: "Bot {{ $labels.bot_id }}/{{ $labels.provider }} rejection rate is {{ $value | humanizePercentage }}."

      # P1.2: High slippage spike
      - alert: SlippageSpikeDetected
        expr: histogram_quantile(0.95, rate(order_slippage_pips_bucket[5m])) > 5
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Order slippage P95 > 5 pips"
          description: "P95 slippage for {{ $labels.bot_id }}/{{ $labels.symbol }} is {{ $value }} pips."

  - name: forex_live_trading_incidents
    interval: 30s
    rules:
      # P1.2: Critical incident storm
      - alert: CriticalIncidentStorm
        expr: rate(trading_incident_created_total{severity="critical"}[5m]) > 0.1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Critical incident storm detected"
          description: "More than 0.1 critical incidents/second over last 5 min."

      # P1.2: Daily lock triggered
      - alert: DailyLockTriggered
        expr: rate(daily_lock_actions_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Daily lock triggered for bot={{ $labels.bot_id }}"
          description: "Daily lock action={{ $labels.action }} reason={{ $labels.reason }}."

  - name: forex_live_trading_account
    interval: 30s
    rules:
      # Equity drift above threshold — broker vs internal tracking diverged
      - alert: AccountEquityDriftHigh
        expr: account_equity_drift_pct > 1.0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Account equity drift > 1% for bot={{ $labels.bot_id }}"
          description: >
            Equity drift for {{ $labels.bot_id }} ({{ $labels.provider }}) is {{ $value | humanizePercentage }}.
            Check for manual trades, rollover charges, or data divergence.

      # Equity dropped to zero — possible account wipeout or connection issue
      - alert: AccountEquityZero
        expr: account_equity == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Account equity is 0 for bot={{ $labels.bot_id }}"
          description: >
            Live account equity reported as 0 for {{ $labels.bot_id }} ({{ $labels.provider }}).
            Potential account wipeout or broker connection issue.

      # Large sudden daily P&L loss
      - alert: DailyPnLLargeLoss
        expr: daily_pnl < -1000
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Large daily loss for bot={{ $labels.bot_id }}"
          description: "Daily P&L for {{ $labels.bot_id }} ({{ $labels.provider }}) is {{ $value }}."

      # Too many open positions — may indicate runaway trading
      - alert: TooManyOpenPositions
        expr: open_positions_total > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Excessive open positions for bot={{ $labels.bot_id }}"
          description: "{{ $value }} positions open for {{ $labels.bot_id }} ({{ $labels.symbol }})."

      # P1.2: UNKNOWN Order SLA breach
      - alert: UnknownOrderSLABreach
        expr: reconciliation_queue_depth > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "UNKNOWN orders unresolved > 5 min"
          description: "{{ $value }} items in reconciliation queue unresolved for more than 5 minutes."

      # P1.2: Reconciliation overdue escalation spike
      - alert: ReconciliationOverdueSpike
        expr: rate(reconciliation_overdue_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Reconciliation items escalated to dead-letter"
          description: "Reconciliation item for bot={{ $labels.bot_id }} escalated (deadline/max-attempts)."

      # P1.2: Bot runtime heartbeat stale (bot may have crashed)
      - alert: BotRuntimeHeartbeatStale
        expr: bot_runtime_heartbeat_age_seconds > 120
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Bot runtime heartbeat stale > 120s"
          description: "Bot {{ $labels.bot_id }} has not sent a heartbeat in {{ $value | humanizeDuration }}."

      # P1.2: Worker heartbeat stale
      - alert: WorkerHeartbeatStale
        expr: worker_heartbeat_age_seconds > 90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Worker {{ $labels.worker_name }} heartbeat stale"
          description: "Worker {{ $labels.worker_name }} last heartbeat {{ $value | humanizeDuration }} ago."

      # P1.2: Provider certification expired/missing
      - alert: ProviderCertificationMissing
        expr: provider_certification_status == 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Provider certification invalid for bot={{ $labels.bot_id }}"
          description: "Provider {{ $labels.provider }} certification expired or missing for bot {{ $labels.bot_id }}."

      # P1.2: Broker quote stale
      - alert: BrokerQuoteStale
        expr: broker_quote_age_seconds > 15
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "Broker quote stale > 15s"
          description: "Bot {{ $labels.bot_id }}/{{ $labels.symbol }} quote age is {{ $value }}s."

  - name: forex_live_trading_execution
    interval: 30s
    rules:
      # P1.2: Order submit latency P95 > 5s
      - alert: OrderSubmitLatencyHigh
        expr: histogram_quantile(0.95, rate(order_submit_latency_ms_bucket[5m])) > 5000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Order submit P95 latency > 5s"
          description: "Order submit P95 is {{ $value }}ms for bot={{ $labels.bot_id }} provider={{ $labels.provider }}."

      # P1.2: High order rejection rate (>20% of placed)
      - alert: HighOrderRejectionRate
        expr: |
          rate(order_rejected_total[5m]) /
          (rate(order_placed_total[5m]) + 0.001) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High order rejection rate > 20%"
          description: "Bot {{ $labels.bot_id }}/{{ $labels.provider }} rejection rate is {{ $value | humanizePercentage }}."

      # P1.2: High slippage spike
      - alert: SlippageSpikeDetected
        expr: histogram_quantile(0.95, rate(order_slippage_pips_bucket[5m])) > 5
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Order slippage P95 > 5 pips"
          description: "P95 slippage for {{ $labels.bot_id }}/{{ $labels.symbol }} is {{ $value }} pips."

  - name: forex_live_trading_incidents
    interval: 30s
    rules:
      # P1.2: Critical incident storm
      - alert: CriticalIncidentStorm
        expr: rate(trading_incident_created_total{severity="critical"}[5m]) > 0.1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Critical incident storm detected"
          description: "More than 0.1 critical incidents/second over last 5 min."

      # P1.2: Daily lock triggered
      - alert: DailyLockTriggered
        expr: rate(daily_lock_actions_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Daily lock triggered for bot={{ $labels.bot_id }}"
          description: "Daily lock action={{ $labels.action }} reason={{ $labels.reason }}."
