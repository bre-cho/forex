version: '3.9'

# ═══════════════════════════════════════════════════════════════════════════
# Forex Trading Platform — Production Docker Compose
# ═══════════════════════════════════════════════════════════════════════════
# Required environment variables (set in .env or Docker Secrets):
#   POSTGRES_PASSWORD, REDIS_PASSWORD, DATABASE_URL, REDIS_URL
#   API_IMAGE, WEB_IMAGE
#   JWT_SECRET, FERNET_KEY, FROZEN_CONTEXT_HMAC_SECRET  ← load from secrets
#
# Secrets: mount via Docker Swarm secrets or a secrets management sidecar.
# Never embed plaintext secrets in this file.
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────── #
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forex_db}
      POSTGRES_USER: ${POSTGRES_USER:-forex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forex} -d ${POSTGRES_DB:-forex_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── PgBouncer connection pooler ────────────────────────────────────────── #
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_USER: ${POSTGRES_USER:-forex}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB:-forex_db}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "25"
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "5"
      SERVER_RESET_QUERY: "DISCARD ALL"
      LOG_CONNECTIONS: "0"
      LOG_DISCONNECTIONS: "0"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "psql -h localhost -p 5432 -U ${POSTGRES_USER:-forex} -c 'SELECT 1' > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── Redis ──────────────────────────────────────────────────────────────── #
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── FastAPI (multi-replica) ────────────────────────────────────────────── #
  api:
    image: ${API_IMAGE:-forex-api:latest}
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - APP_ENV=production
      - IS_PRODUCTION=true
      - DEBUG=false
      - ALLOW_STUB_RUNTIME=false
      - ENABLE_LEGACY_ROUTES=false
      - REQUIRE_SIGNED_GATE_CONTEXT=true
      - LIVE_BURN_IN_REQUIRED=true
      - ENABLE_RECONCILIATION_DAEMON=true
      - ENABLE_SUBMIT_OUTBOX_RECOVERY_WORKER=true
    env_file:
      - ../../.env
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ── Reconciliation worker ──────────────────────────────────────────────── #
  reconciliation-worker:
    image: ${API_IMAGE:-forex-api:latest}
    command: ["python", "-m", "app.workers.reconciliation_worker_entrypoint"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - APP_ENV=production
      - IS_PRODUCTION=true
      - DEBUG=false
      - WORKER_MODE=reconciliation
    env_file:
      - ../../.env
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Submit-outbox recovery worker ─────────────────────────────────────── #
  submit-outbox-recovery:
    image: ${API_IMAGE:-forex-api:latest}
    command: ["python", "-m", "app.workers.submit_outbox_recovery_worker_entrypoint"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - APP_ENV=production
      - IS_PRODUCTION=true
      - DEBUG=false
      - WORKER_MODE=outbox_recovery
    env_file:
      - ../../.env
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Nightly integrity worker ───────────────────────────────────────────── #
  integrity-worker:
    image: ${API_IMAGE:-forex-api:latest}
    command: ["python", "-m", "app.workers.order_ledger_integrity_worker_entrypoint"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - APP_ENV=production
      - IS_PRODUCTION=true
      - DEBUG=false
      - WORKER_MODE=integrity
      - INTEGRITY_RUN_HOUR_UTC=${INTEGRITY_RUN_HOUR_UTC:-0}
      - INTEGRITY_RUN_MINUTE_UTC=${INTEGRITY_RUN_MINUTE_UTC:-15}
      - INTEGRITY_RUN_ON_STARTUP=${INTEGRITY_RUN_ON_STARTUP:-true}
    env_file:
      - ../../.env
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── Next.js web frontend ───────────────────────────────────────────────── #
  web:
    image: ${WEB_IMAGE:-forex-web:latest}
    environment:
      - NEXT_PUBLIC_API_URL=${APP_URL}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Nginx reverse proxy + TLS ──────────────────────────────────────────── #
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -sf http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Prometheus ─────────────────────────────────────────────────────────── #
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/-/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── Grafana ────────────────────────────────────────────────────────────── #
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3100:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme_in_production}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${APP_URL:-http://localhost}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ../monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  postgres_data:
    labels:
      backup: "true"
      backup_schedule: "daily"
  redis_data:
    labels:
      backup: "true"
      backup_schedule: "daily"
  prometheus_data:
  grafana_data:
  nginx_cache:

