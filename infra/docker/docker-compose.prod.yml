version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forex_db}
      POSTGRES_USER: ${POSTGRES_USER:-forex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    restart: always

  api:
    image: ${API_IMAGE:-forex-api:latest}
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - APP_ENV=production
      - DEBUG=false
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis
    restart: always
    deploy:
      replicas: 2

  # Dedicated reconciliation worker — runs the unknown-order daemon in isolation
  # so that API replica restarts do not interrupt in-flight reconcile cycles.
  reconciliation-worker:
    image: ${API_IMAGE:-forex-api:latest}
    command: ["python", "-m", "app.workers.reconciliation_worker_entrypoint"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - APP_ENV=production
      - DEBUG=false
      - WORKER_MODE=reconciliation
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis
    restart: always
    deploy:
      replicas: 1

  web:
    image: ${WEB_IMAGE:-forex-web:latest}
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${APP_URL}
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    restart: always

volumes:
  postgres_data:
  redis_data:
