name: API CI

on:
  push:
    branches: [main, develop]
    paths: ['apps/api/**', 'services/**', 'backend/**', '.github/workflows/api-ci.yml', '.github/scripts/**']
  pull_request:
    branches: [main]
    paths: ['apps/api/**', 'services/**', 'backend/**', '.github/workflows/api-ci.yml', '.github/scripts/**']

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: forex_test
          POSTGRES_USER: forex
          POSTGRES_PASSWORD: forex_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard legacy/monorepo drift
        run: |
          BASE_REF="origin/main"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.base_ref }}"
          fi
          bash .github/scripts/check_legacy_backend_drift.sh "$BASE_REF"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install API dependencies
        run: |
          cd apps/api
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          cd apps/api
          ruff check app/
        continue-on-error: true

      - name: Type check (mypy)
        run: |
          cd apps/api
          mypy app/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://forex:forex_test@localhost:5432/forex_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test_secret_key
          SECRET_KEY: test_secret_key
        run: |
          cd apps/api
          pytest tests/ -v --cov=app --cov-report=xml
        continue-on-error: true

      - name: Check migration consistency
        env:
          DATABASE_URL: postgresql+asyncpg://forex:forex_test@localhost:5432/forex_test
        run: |
          cd apps/api
          alembic check
        continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build API Docker image
        run: docker build -t forex-api:ci apps/api/
