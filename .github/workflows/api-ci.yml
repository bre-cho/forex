name: API CI

on:
  push:
    branches: [main, develop]
    paths: ['apps/api/**', 'services/**', 'backend/**', '.github/workflows/api-ci.yml', '.github/scripts/**']
  pull_request:
    branches: [main]
    paths: ['apps/api/**', 'services/**', 'backend/**', '.github/workflows/api-ci.yml', '.github/scripts/**']

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: forex_test
          POSTGRES_USER: forex
          POSTGRES_PASSWORD: forex_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard legacy/monorepo drift
        run: |
          BASE_REF="origin/main"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.base_ref }}"
          fi
          bash .github/scripts/check_legacy_backend_drift.sh "$BASE_REF"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install API dependencies
        run: |
          cd apps/api
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          cd apps/api
          ruff check app/
        continue-on-error: true

      - name: Type check (mypy)
        run: |
          cd apps/api
          mypy app/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://forex:forex_test@localhost:5432/forex_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test_secret_key
          SECRET_KEY: test_secret_key
        run: |
          cd apps/api
          pytest tests/ -v --cov=app --cov-report=xml
        continue-on-error: true

      - name: Compile all Python services
        run: |
          python -m compileall -q services/trading-core services/execution-service apps/api/app ai_trading_brain

      - name: Check no NotImplementedError in live provider paths
        run: |
          python - <<'EOF'
          import ast, sys, pathlib, re

          providers = list(pathlib.Path("services/execution-service/execution_service/providers").glob("*.py"))
          violations = []
          for p in providers:
              if p.name in ("base.py", "paper.py", "__init__.py"):
                  continue
              src = p.read_text()
              tree = ast.parse(src)
              for node in ast.walk(tree):
                  if isinstance(node, ast.Raise):
                      exc = node.exc
                      name = ""
                      if isinstance(exc, ast.Call) and isinstance(exc.func, ast.Name):
                          name = exc.func.id
                      elif isinstance(exc, ast.Name):
                          name = exc.id
                      if name == "NotImplementedError":
                          # Check it's not inside a live-mode guard (heuristic: check surrounding lines)
                          lines = src.splitlines()
                          line = lines[node.lineno - 1]
                          if "stub" in src[:200].lower() or "require_sdk" not in src:
                              violations.append(f"{p}:{node.lineno}: bare NotImplementedError not behind fail-closed guard")
          if violations:
              print("FAIL: bare NotImplementedError detected in live providers:")
              for v in violations:
                  print(" ", v)
              sys.exit(1)
          print("OK: live provider NotImplementedError check passed")
          EOF


      - name: Verify live mode has no stub fallback
        run: |
          bash .github/scripts/verify_live_no_stub.sh

      - name: Verify live mode has no fallback spec/pip
        run: |
          bash .github/scripts/verify_live_no_fallback_spec.sh

      - name: Verify broker gate wiring
        run: |
          .github/scripts/verify_broker_gate_wiring.py

      - name: Verify live import boundary
        run: |
          .github/scripts/verify_live_import_boundary.py

      - name: Verify no live stub provider
        run: |
          .github/scripts/verify_no_live_stub_provider.py

      - name: Verify frontend/API contract
        run: |
          .github/scripts/verify_frontend_api_contract.py

      - name: Verify Alembic single head (mandatory)
        run: |
          python .github/scripts/verify_alembic_single_head.py

      - name: Verify experiment stage policy (mandatory)
        run: |
          python .github/scripts/verify_experiment_stage_policy.py

      - name: Verify parity contract harness (mandatory)
        run: |
          PYTHONPATH=/workspaces/forex:services/execution-service pytest -q services/execution-service/tests/test_parity_contract.py

      - name: Verify market data quality failure scenarios (mandatory)
        run: |
          bash .github/scripts/verify_market_data_quality_scenarios.sh

      - name: Verify runtime snapshot payload contract (mandatory)
        run: |
          python .github/scripts/verify_runtime_snapshot_payload.py

      - name: Verify live safety closure (mandatory)
        run: |
          bash .github/scripts/verify_live_safety_closure.sh

      - name: Verify QA parity + runtime snapshot API tests (mandatory)
        env:
          DATABASE_URL: postgresql+asyncpg://forex:forex_test@localhost:5432/forex_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test_secret_key
          SECRET_KEY: test_secret_key
        run: |
          PYTHONPATH=/workspaces/forex:apps/api:services/trading-core:services/execution-service \
            pytest -q \
              apps/api/tests/test_qa_parity_endpoint.py \
              apps/api/tests/test_runtime_snapshot_contract.py

      - name: Verify production config excludes legacy stack
        run: |
          bash .github/scripts/verify_production_no_legacy_stack.sh

      - name: Run P0 gate + trading-core tests
        run: |
          PYTHONPATH=/workspaces/forex:services/trading-core:services/execution-service \
            pytest services/trading-core/tests/ -v
        continue-on-error: true

      - name: Run focused live trading invariant tests
        env:
          DATABASE_URL: postgresql+asyncpg://forex:forex_test@localhost:5432/forex_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test_secret_key
          SECRET_KEY: test_secret_key
        run: |
          PYTHONPATH=/workspaces/forex:apps/api:services/trading-core:services/execution-service \
            pytest -q \
              apps/api/tests/test_daily_trading_state.py \
              services/execution-service/tests/test_reconciliation_worker.py

      - name: Check migration consistency
        env:
          DATABASE_URL: postgresql+asyncpg://forex:forex_test@localhost:5432/forex_test
        run: |
          cd apps/api
          alembic check

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build API Docker image
        run: docker build -t forex-api:ci apps/api/
