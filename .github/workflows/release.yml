name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  live-safety-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Alembic single head
        run: |
          python .github/scripts/verify_alembic_single_head.py

      - name: Verify experiment stage policy
        run: |
          python .github/scripts/verify_experiment_stage_policy.py

      - name: Verify market data quality scenarios
        run: |
          bash .github/scripts/verify_market_data_quality_scenarios.sh

      - name: Verify runtime snapshot payload contract
        run: |
          python .github/scripts/verify_runtime_snapshot_payload.py

      - name: Verify live import boundary
        run: |
          python .github/scripts/verify_live_import_boundary.py

      - name: Verify no live stub provider
        run: |
          python .github/scripts/verify_no_live_stub_provider.py

      - name: Verify no stub runtime in production/staging
        run: |
          python .github/scripts/verify_no_stub_in_prod.py

      - name: Verify provider certification gate
        run: |
          python .github/scripts/verify_provider_certification_gate.py

      - name: Verify no live fallback spec
        run: |
          bash .github/scripts/verify_live_no_fallback_spec.sh

      - name: Verify no live stub (integration paths)
        run: |
          bash .github/scripts/verify_live_no_stub.sh

      - name: Verify broker gate wiring
        run: |
          python .github/scripts/verify_broker_gate_wiring.py

      - name: Verify frontend API contract
        run: |
          python .github/scripts/verify_frontend_api_contract.py

      - name: Verify production no legacy stack
        run: |
          bash .github/scripts/verify_production_no_legacy_stack.sh

      - name: Verify live safety closure
        run: |
          bash .github/scripts/verify_live_safety_closure.sh

      - name: Verify outbox recovery scenario
        run: |
          python .github/scripts/verify_outbox_recovery_scenario.py

      - name: Verify daily lock close-all scenario
        run: |
          python .github/scripts/verify_daily_lock_closeall_scenario.py

      - name: Verify unknown reconciliation scenario
        run: |
          python .github/scripts/verify_unknown_reconciliation_scenario.py

  build-and-deploy:
    needs: live-safety-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: |
          docker build -t ${{ secrets.REGISTRY }}/forex-api:${{ github.ref_name }} apps/api/

      - name: Build Web image
        run: |
          docker build -t ${{ secrets.REGISTRY }}/forex-web:${{ github.ref_name }} apps/web/

      - name: Push images
        run: |
          echo ${{ secrets.REGISTRY_PASSWORD }} | docker login ${{ secrets.REGISTRY }} -u ${{ secrets.REGISTRY_USER }} --password-stdin
          docker push ${{ secrets.REGISTRY }}/forex-api:${{ github.ref_name }}
          docker push ${{ secrets.REGISTRY }}/forex-web:${{ github.ref_name }}

      - name: Deploy
        run: |
          echo "Deploy ${{ github.ref_name }} to production"
          # SSH deploy or kubectl apply here

      - name: Smoke test
        run: |
          sleep 30
          curl --fail ${{ secrets.APP_URL }}/health || exit 1
